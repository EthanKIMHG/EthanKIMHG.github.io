<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ko-KR' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f0d0c">
    <title>
      {% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}
    </title>
    <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | escape }}">
    <script>
      (function () {
        var savedTheme = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? "dark" : "light");
      })();
    </script>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%230f0d0c'/%3E%3Ctext x='50%25' y='58%25' text-anchor='middle' font-size='28' font-family='monospace' font-weight='700' fill='%23dadfe7'%3EEK%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% feed_meta %}
  </head>
  <body>
    <header class="site-header">
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="site-clock" href="{{ '/' | relative_url }}" aria-label="Home">
          <span id="local-clock">Ethan Kim</span>
        </a>

        <div class="nav-actions">
          <a href="{{ '/posts/' | relative_url }}" {% if page.url == '/' or page.url contains '/posts/' %}aria-current="page"{% endif %}>posts</a>
          <a href="{{ '/portfolio/' | relative_url }}" {% if page.url contains '/portfolio/' %}aria-current="page"{% endif %}>portfolio</a>
          {% if site.github_username %}
            <a href="https://github.com/{{ site.github_username | strip }}" rel="me noopener" target="_blank">github</a>
          {% endif %}
          <a class="icon-link" href="{{ '/feed.xml' | relative_url }}" aria-label="RSS feed">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 11a9 9 0 0 1 9 9"></path>
              <path d="M4 4a16 16 0 0 1 16 16"></path>
              <circle cx="5" cy="19" r="1"></circle>
            </svg>
          </a>
          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle color theme">
            <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 14.2A8.6 8.6 0 0 1 9.8 3a8.8 8.8 0 1 0 11.2 11.2Z"></path>
            </svg>
            <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2"></path>
              <path d="M12 20v2"></path>
              <path d="m4.93 4.93 1.41 1.41"></path>
              <path d="m17.66 17.66 1.41 1.41"></path>
              <path d="M2 12h2"></path>
              <path d="M20 12h2"></path>
              <path d="m6.34 17.66-1.41 1.41"></path>
              <path d="m19.07 4.93-1.41 1.41"></path>
            </svg>
          </button>
          {% if page.layout == 'home' %}
            <label class="site-search">
              <svg viewBox="0 0 20 20" aria-hidden="true">
                <path d="M14.4 14.4 18 18"></path>
                <circle cx="8.6" cy="8.6" r="6.2"></circle>
              </svg>
              <input id="post-search" type="search" placeholder="Search" autocomplete="off">
            </label>
          {% endif %}
        </div>
      </nav>
    </header>

    <main class="site-main">
      {{ content }}
    </main>

    <script>
      (function () {
        var root = document.documentElement;
        var toggle = document.getElementById("theme-toggle");
        var clock = document.getElementById("local-clock");
        var search = document.getElementById("post-search");

        function formatSeoulTime() {
          if (!clock) return;
          var formatter = new Intl.DateTimeFormat("en-US", {
            weekday: "short",
            hour: "2-digit",
            minute: "2-digit",
            hour12: false,
            timeZone: "Asia/Seoul"
          });
          clock.textContent = formatter.format(new Date()).replace(",", "") + ", Seoul";
        }

        function applySearch(value) {
          var query = (value || "").trim().toLowerCase();
          document.querySelectorAll(".post-item").forEach(function (item) {
            var text = item.dataset.search || "";
            item.classList.toggle("is-hidden", query && text.indexOf(query) === -1);
          });
          document.querySelectorAll(".post-year").forEach(function (group) {
            var visible = group.querySelector(".post-item:not(.is-hidden)");
            group.classList.toggle("is-hidden", !visible);
          });
        }

        formatSeoulTime();
        window.setInterval(formatSeoulTime, 30000);

        if (toggle) {
          toggle.addEventListener("click", function () {
            var next = root.dataset.theme === "dark" ? "light" : "dark";
            root.dataset.theme = next;
            localStorage.setItem("theme", next);
          });
        }

        if (search) {
          search.addEventListener("input", function (event) {
            applySearch(event.target.value);
          });

          document.querySelectorAll("[data-filter-tag]").forEach(function (tag) {
            tag.addEventListener("click", function (event) {
              event.preventDefault();
              search.value = event.currentTarget.dataset.filterTag || "";
              applySearch(search.value);
              search.focus();
            });
          });
        }
      })();
    </script>
  </body>
</html>
